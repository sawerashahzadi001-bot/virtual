version: "3.9"
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    expose:
      - "4174"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    expose:
      - "5000"

  proxy:
    image: nginx:stable-alpine
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
